<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bắt Hoa Đón 8/3 - Glassmorphism Edition 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@600&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            user-select: none;
            /* Gradient chuyển màu liên tục dải màu hồng */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffc3a0, #ffb199, #ff758c);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Style Glassmorphism cho UI Container */
        #ui-container {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            /* Kính mờ */
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.3);
            border-radius: 20px;
            padding: 20px 40px;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #fff;
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 0 2px 10px rgba(255, 20, 147, 0.5);
            letter-spacing: 2px;
        }

        #score {
            font-size: 1.8rem;
            color: #fff;
            margin-top: 10px;
            text-shadow: 0 2px 5px rgba(255, 20, 147, 0.4);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: #fff;
            font-weight: bold;
            z-index: 20;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Hiệu ứng Particle (hạt sáng) nổ tung màu hồng */
        .particle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ffffff, #ff1493);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
            animation: burst 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 100;
        }

        @keyframes burst {
            0% { 
                transform: translate(0, 0) scale(1); 
                opacity: 1; 
            }
            100% { 
                /* Biến --tx và --ty sẽ được set bằng JavaScript để bay ra các hướng */
                transform: translate(var(--tx), var(--ty)) scale(0); 
                opacity: 0; 
            }
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loading">Đang chuẩn bị hoa cho bạn... 🌸</div>
    <div id="ui-container">
        <h1>Happy 8/3</h1>
        <div id="score">Score: <span id="score-val">0</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- HỆ THỐNG ÂM THANH (Web Audio API) ---
        // Tạo tiếng "Ting" lấp lánh mà không cần file audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playCatchSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; // Âm thanh tròn, vang như tiếng chuông/thủy tinh
            oscillator.frequency.setValueAtTime(1046.50, audioCtx.currentTime); // Note C6
            oscillator.frequency.exponentialRampToValueAtTime(2093.00, audioCtx.currentTime + 0.1); // Vuốt lên C7
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); // Fade out nhanh
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.4);
        }


        // --- SETUP SCENE THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 12; // Kéo camera lùi lại xíu để có không gian rơi

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 2);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffddf4, 3);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        let baseFlower = null;
        const flowers = [];
        let score = 0;
        let fallSpeed = 0.05;
        let spawnRate = 1500;
        let lastSpawnTime = 0;

        const scoreEl = document.getElementById('score-val');
        const loadingEl = document.getElementById('loading');

        // LOAD MODEL
        const loader = new GLTFLoader();
        loader.load('flower_bouquet.glb', function (gltf) {
            baseFlower = gltf.scene;
            
            // ĐÃ TĂNG SCALE: Giúp hoa to đùng dễ bấm hơn (Từ 1.5 lên 4.0)
            baseFlower.scale.set(4.0, 4.0, 4.0); 
            
            loadingEl.style.display = 'none';
            animate();
        });

        function spawnFlower() {
            if (!baseFlower) return;
            const newFlower = baseFlower.clone();
            
            const xPos = (Math.random() - 0.5) * 18; // Mở rộng không gian X
            newFlower.position.set(xPos, 10, 0); // Bắt đầu rơi từ Y = 10
            
            newFlower.rotation.x = Math.random() * Math.PI;
            newFlower.rotation.y = Math.random() * Math.PI;

            scene.add(newFlower);
            flowers.push(newFlower);
        }

        // --- XỬ LÝ CLICK & HIỆU ỨNG ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Đảm bảo audio context được kích hoạt khi user tương tác lần đầu
            if (audioCtx.state === 'suspended') audioCtx.resume();

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(flowers, true);

            if (intersects.length > 0) {
                let clickedObject = intersects[0].object;
                while (clickedObject.parent && clickedObject.parent.type !== "Scene") {
                    clickedObject = clickedObject.parent;
                }

                scene.remove(clickedObject);
                const index = flowers.indexOf(clickedObject);
                if (index > -1) flowers.splice(index, 1);

                score++;
                scoreEl.innerText = score;

                // Càng chơi càng cuốn (nhanh dần)
                fallSpeed += 0.002;
                if (spawnRate > 400) spawnRate -= 25;

                // Gọi âm thanh và hiệu ứng
                playCatchSound();
                createParticleBurst(event.clientX, event.clientY);
            }
        });

        // Tạo hiệu ứng hạt nổ (Particle Burst) bằng CSS
        function createParticleBurst(x, y) {
            const particleCount = 15; // Số lượng hạt nổ ra
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Đặt vị trí ban đầu ngay tại con trỏ chuột
                particle.style.left = `${x - 6}px`; // Trừ đi một nửa width/height của hạt
                particle.style.top = `${y - 6}px`;
                
                // Tính toán hướng bay ngẫu nhiên 360 độ
                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 80; // Khoảng cách bay ra (50px - 130px)
                
                // Truyền giá trị vào CSS Variables để @keyframes sử dụng
                particle.style.setProperty('--tx', `${Math.cos(angle) * velocity}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * velocity}px`);
                
                document.body.appendChild(particle);

                // Tự dọn dẹp rác DOM sau khi animation kết thúc
                setTimeout(() => {
                    particle.remove();
                }, 600);
            }
        }

        // VÒNG LẶP GAME
        function animate(time) {
            requestAnimationFrame(animate);

            if (time - lastSpawnTime > spawnRate) {
                spawnFlower();
                lastSpawnTime = time;
            }

            for (let i = flowers.length - 1; i >= 0; i--) {
                const f = flowers[i];
                f.position.y -= fallSpeed;
                f.rotation.y += 0.015;
                f.rotation.x += 0.01;

                if (f.position.y < -12) {
                    scene.remove(f);
                    flowers.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
