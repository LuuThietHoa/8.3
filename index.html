<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bắt Hoa Đón 8/3 - 3 Vòng Thử Thách 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@600;800&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            user-select: none;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffc3a0, #ffb199, #ff758c);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Khung UI hiển thị thông số */
        #ui-container {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.3);
            border-radius: 20px;
            padding: 15px 40px;
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: center;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            color: #fff;
            text-shadow: 0 2px 5px rgba(255, 20, 147, 0.4);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .stat-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Bảng thông báo Modal (Thua / Qua vòng) */
        #modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 50px 0 rgba(255, 105, 180, 0.4);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            z-index: 50;
            display: none; /* Ẩn mặc định */
            flex-direction: column;
            align-items: center;
        }

        #modal h2 {
            font-family: 'Pacifico', cursive;
            color: #fff;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            text-shadow: 0 2px 10px rgba(255, 20, 147, 0.5);
        }

        #modal p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 25px;
            text-shadow: 0 1px 3px rgba(255, 20, 147, 0.3);
        }

        #modal button {
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            color: white;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #modal button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.6);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: #fff;
            z-index: 20;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 15px;
        }

        .particle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ffffff, #ff1493);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
            animation: burst 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 100;
        }

        @keyframes burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loading">Đang chuẩn bị hoa cho bạn... 🌸</div>

    <div id="ui-container">
        <div class="stat-box">
            <span class="stat-label">Vòng</span>
            <span class="stat-value" id="round-val">1</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Thời gian</span>
            <span class="stat-value"><span id="time-val">60</span>s</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Điểm</span>
            <span class="stat-value" id="score-val">0</span>
        </div>
    </div>

    <div id="modal">
        <h2 id="modal-title">Tiêu đề</h2>
        <p id="modal-desc">Mô tả chi tiết</p>
        <button id="modal-btn">Nút bấm</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- CẤU HÌNH 3 VÒNG CHƠI ---
        const levelConfig = {
            1: { speed: 0.05, spawnRate: 1500 }, // Vòng 1: Chậm rãi, thư giãn
            2: { speed: 0.08, spawnRate: 1000 }, // Vòng 2: Nhanh hơn xíu
            3: { speed: 0.12, spawnRate: 600 }   // Vòng 3: Nhanh nhạy, tập trung cao
        };

        let currentRound = 1;
        let timeLeft = 60;
        let score = 0;
        let gameStatus = 'loading'; // 'loading', 'playing', 'stopped'
        let timerInterval;

        let fallSpeed = levelConfig[1].speed;
        let spawnRate = levelConfig[1].spawnRate;
        let lastSpawnTime = 0;

        // --- HỆ THỐNG ÂM THANH ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playCatchSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(1046.50, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(2093.00, audioCtx.currentTime + 0.1); 
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); 
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.4);
        }

        // --- SETUP SCENE THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 12;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffddf4, 3);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        let baseFlower = null;
        let flowers = [];

        // UI Elements
        const scoreEl = document.getElementById('score-val');
        const timeEl = document.getElementById('time-val');
        const roundEl = document.getElementById('round-val');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalBtn = document.getElementById('modal-btn');

        // LOAD MODEL
        const loader = new GLTFLoader();
        loader.load('flower_bouquet.glb', function (gltf) {
            baseFlower = gltf.scene;
            baseFlower.scale.set(4.0, 4.0, 4.0); // Hoa to đùng dễ bắt
            
            document.getElementById('loading').style.display = 'none';
            showModal("Sẵn sàng chưa?", "Bắt hoa cẩn thận nhé, trượt 1 bông là thua đó!", "Chơi luôn", startGame);
            animate();
        });

        // --- GAME LOGIC ---
        function startGame() {
            modal.style.display = 'none';
            
            // Clear hoa cũ nếu có
            flowers.forEach(f => scene.remove(f));
            flowers = [];
            
            timeLeft = 60;
            timeEl.innerText = timeLeft;
            roundEl.innerText = currentRound;
            
            fallSpeed = levelConfig[currentRound].speed;
            spawnRate = levelConfig[currentRound].spawnRate;
            
            gameStatus = 'playing';
            lastSpawnTime = performance.now(); // Reset time spawn

            // Bắt đầu đếm ngược
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameStatus !== 'playing') return;
                timeLeft--;
                timeEl.innerText = timeLeft;

                // Hết 60 giây -> Qua vòng hoặc Chiến thắng
                if (timeLeft <= 0) {
                    gameStatus = 'stopped';
                    if (currentRound < 3) {
                        currentRound++;
                        showModal(`Tuyệt Vời! 💖`, `Chuẩn bị sang Vòng ${currentRound}. Tốc độ sẽ nhanh hơn đó nha!`, "Tiếp tục", startGame);
                    } else {
                        showModal("Chiến Thắng! 🎉", `Đỉnh quá dọoo! Chúc nàng 8/3 rực rỡ và luôn xinh đẹp như những đóa hoa này nhé! Điểm của nàng: ${score}`, "Chơi lại từ đầu", resetGame);
                    }
                }
            }, 1000);
        }

        function gameOver() {
            gameStatus = 'stopped';
            clearInterval(timerInterval);
            showModal("Úi da... 🥺", "Nàng ơi, làm lại một lần nữa nhá", "Chơi lại vòng này", startGame);
        }

        function resetGame() {
            currentRound = 1;
            score = 0;
            scoreEl.innerText = score;
            startGame();
        }

        function showModal(title, desc, btnText, callback) {
            modalTitle.innerText = title;
            modalDesc.innerText = desc;
            modalBtn.innerText = btnText;
            modal.style.display = 'flex';
            
            // Xóa sự kiện cũ và gắn sự kiện mới cho nút
            modalBtn.onclick = () => {
                if (audioCtx.state === 'suspended') audioCtx.resume(); // Đảm bảo audio chạy được
                callback();
            };
        }

        function spawnFlower() {
            if (!baseFlower || gameStatus !== 'playing') return;
            const newFlower = baseFlower.clone();
            const xPos = (Math.random() - 0.5) * 18;
            newFlower.position.set(xPos, 10, 0);
            newFlower.rotation.x = Math.random() * Math.PI;
            newFlower.rotation.y = Math.random() * Math.PI;
            scene.add(newFlower);
            flowers.push(newFlower);
        }

        // --- XỬ LÝ CLICK ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (gameStatus !== 'playing') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(flowers, true);

            if (intersects.length > 0) {
                let clickedObject = intersects[0].object;
                while (clickedObject.parent && clickedObject.parent.type !== "Scene") {
                    clickedObject = clickedObject.parent;
                }

                scene.remove(clickedObject);
                const index = flowers.indexOf(clickedObject);
                if (index > -1) flowers.splice(index, 1);

                score++;
                scoreEl.innerText = score;

                playCatchSound();
                createParticleBurst(event.clientX, event.clientY);
            }
        });

        function createParticleBurst(x, y) {
            const particleCount = 15;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = `${x - 6}px`;
                particle.style.top = `${y - 6}px`;
                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 80;
                particle.style.setProperty('--tx', `${Math.cos(angle) * velocity}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * velocity}px`);
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        }

        // VÒNG LẶP ANIMATION
        function animate(time) {
            requestAnimationFrame(animate);

            if (gameStatus === 'playing') {
                if (time - lastSpawnTime > spawnRate) {
                    spawnFlower();
                    lastSpawnTime = time;
                }

                for (let i = flowers.length - 1; i >= 0; i--) {
                    const f = flowers[i];
                    f.position.y -= fallSpeed;
                    f.rotation.y += 0.015;
                    f.rotation.x += 0.01;

                    // Nếu hoa rơi khỏi màn hình (qua tọa độ Y = -10)
                    if (f.position.y < -10) {
                        // KÍCH HOẠT THUA CUỘC
                        gameOver();
                    }
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
